# GitHub Pages Deployment — proispro disc golf inventory site
#
# REQUIRED SETUP (one-time, in GitHub repo settings):
#   1. Go to Settings → Pages
#   2. Under "Build and deployment", set Source to "GitHub Actions"
#   3. Configure DNS for proispro.com:
#      - Add A records pointing to GitHub Pages IPs:
#          185.199.108.153
#          185.199.109.153
#          185.199.110.153
#          185.199.111.153
#      - Or add a CNAME record pointing to <your-username>.github.io
#   4. Once DNS propagates, GitHub will auto-provision HTTPS via Let's Encrypt.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload repo root — no build step needed for this vanilla HTML/CSS/JS site
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
