<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProIsPro – Disc Inventory</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="img/logo.png" type="image/png" />
</head>
<body>

<div x-data="discApp()" x-cloak>

  <!-- ── Loading Screen ── -->
  <div x-show="loading" class="empty-state" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
    <img src="img/logo.png" class="logo-img logo-img--login" alt="ProIsPro" />
    <h2 style="margin-top:.8rem;">Loading…</h2>
  </div>

  <!-- ── Login Screen ── -->
  <template x-if="!loading && !user">
    <div class="empty-state" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
      <img src="img/logo.png" class="logo-img logo-img--login" alt="ProIsPro" />
      <p class="tagline" style="margin-bottom:1.5rem;margin-top:.5rem;">Your personal disc golf bag tracker</p>
      <div style="display:flex;gap:1rem;flex-direction:column;">
        <button class="btn btn-primary" @click="signIn('google')">🔑 Sign in with Google</button>
        <button class="btn btn-secondary" @click="signIn('github')">🐙 Sign in with GitHub</button>
      </div>
    </div>
  </template>

  <!-- ── Main App (authenticated) ── -->
  <template x-if="!loading && user">
    <div>

      <!-- ── Header ── -->
      <header class="site-header">
        <div class="header-inner">
          <h1 class="logo"><img src="img/logo.png" class="logo-img" alt="ProIsPro" /></h1>
          <p class="tagline">Your personal disc golf bag tracker</p>
        </div>
        <div class="header-actions">
          <a href="flight-guide.html" class="btn btn-secondary btn-sm" title="Browse the disc flight guide">🗺 Flight Guide</a>
          <span class="disc-count" x-text="user.email || 'Local mode'" style="font-size:.78rem;"></span>
          <button class="btn btn-secondary btn-sm" @click="signOut()" title="Sign out">↪ Logout</button>
          <button class="btn btn-primary" x-show="activeTab === 'inventory'" @click="openAddModal()">+ Add Disc</button>
          <button class="btn btn-primary" x-show="activeTab === 'bags'" @click="openCreateBagModal()">+ Create Bag</button>
          <button class="btn btn-primary" x-show="activeTab === 'courses'" @click="openPinModal()">📍 Pin a Course</button>
        </div>
      </header>

      <!-- ── Tab Navigation ── -->
      <nav class="tab-nav" aria-label="Main navigation">
        <button class="tab-btn" :class="{active: activeTab==='inventory'}" @click="activeTab='inventory'">🥏 Inventory</button>
        <button class="tab-btn" :class="{active: activeTab==='bags'}" @click="activeTab='bags'">👜 Bags</button>
        <button class="tab-btn" :class="{active: activeTab==='courses'}" @click="activeTab='courses'">🗺 Courses</button>
      </nav>

      <!-- ── Inventory Tab ── -->
      <div x-show="activeTab === 'inventory'">

      <!-- ── Toolbar ── -->
      <div class="toolbar">
        <input
          type="search"
          class="search-input"
          placeholder="Search discs…"
          aria-label="Search discs"
          x-model="search"
        />
        
        <!-- View toggle -->
        <div class="view-toggle">
          <button type="button" class="view-toggle-btn" :class="{ 'view-toggle-btn--active': viewMode === 'grid' }" @click="viewMode = 'grid'" title="Grid view">⊞</button>
          <button type="button" class="view-toggle-btn" :class="{ 'view-toggle-btn--active': viewMode === 'list' }" @click="viewMode = 'list'" title="List view">☰</button>
          <button type="button" class="view-toggle-btn" :class="{ 'view-toggle-btn--active': viewMode === 'compact' }" @click="viewMode = 'compact'" title="Compact view">≡</button>
        </div>
        
        <!-- Group by -->
        <select class="select-input" aria-label="Group by" x-model="groupBy">
          <option value="none">No grouping</option>
          <option value="type">Group by Type</option>
          <option value="brand">Group by Brand</option>
          <option value="bag">Group by Bag</option>
        </select>
        
        <!-- Sort -->
        <select class="select-input" aria-label="Sort by" x-model="sortBy">
          <option value="name-asc">Name (A→Z)</option>
          <option value="name-desc">Name (Z→A)</option>
          <option value="type-asc">Type (Putter→Distance)</option>
          <option value="type-desc">Type (Distance→Putter)</option>
          <option value="speed-asc">Speed (Low→High)</option>
          <option value="speed-desc">Speed (High→Low)</option>
          <option value="glide-asc">Glide (Low→High)</option>
          <option value="glide-desc">Glide (High→Low)</option>
          <option value="turn-asc">Turn (Understable→Overstable)</option>
          <option value="turn-desc">Turn (Overstable→Understable)</option>
          <option value="fade-asc">Fade (Low→High)</option>
          <option value="fade-desc">Fade (High→Low)</option>
          <option value="weight-asc">Weight (Low→High)</option>
          <option value="weight-desc">Weight (High→Low)</option>
          <option value="condition-asc">Condition (Best→Worst)</option>
          <option value="condition-desc">Condition (Worst→Best)</option>
          <option value="added-desc">Date Added (Newest)</option>
          <option value="added-asc">Date Added (Oldest)</option>
        </select>
        
        <!-- Advanced filters popover -->
        <div class="advanced-popover-wrap">
          <button type="button" class="btn btn-secondary" @click="showAdvancedPopover = !showAdvancedPopover">⚙️ Advanced</button>
          <div class="advanced-popover" x-show="showAdvancedPopover" @click.outside="showAdvancedPopover = false">
            <div class="advanced-popover-row">
              <label class="advanced-popover-label">Brand</label>
              <input type="text" placeholder="Filter by brand…" x-model="filterBrand" />
            </div>
            <div class="advanced-popover-row">
              <label class="advanced-popover-label">Bag</label>
              <select x-model="filterBag">
                <option value="">All bags</option>
                <template x-for="bag in bags" :key="bag.id">
                  <option :value="bag.id" x-text="bag.name"></option>
                </template>
              </select>
            </div>
            <div class="advanced-popover-row">
              <label class="advanced-popover-label">Condition</label>
              <select x-model="filterCondition">
                <option value="">All conditions</option>
                <option value="new">New / Mint</option>
                <option value="good">Good</option>
                <option value="used">Used</option>
                <option value="beat">Beat-in</option>
              </select>
            </div>
            <div class="advanced-popover-row">
              <label class="advanced-popover-label">Weight Range (g)</label>
              <div style="display:flex;gap:.4rem;">
                <input type="number" placeholder="Min" x-model="filterWeightMin" style="flex:1;" />
                <input type="number" placeholder="Max" x-model="filterWeightMax" style="flex:1;" />
              </div>
            </div>
            <button type="button" class="btn btn-secondary btn-sm" style="width:100%;" 
                    @click="filterBrand=''; filterBag=''; filterCondition=''; filterWeightMin=null; filterWeightMax=null;">
              Clear all filters
            </button>
          </div>
        </div>
        
        <span class="disc-count" x-text="discCount"></span>
      </div>

      <!-- ── Filter Chips ── -->
      <div class="toolbar-filter-chips">
        <button type="button" class="filter-chip" :class="{ 'filter-chip--active': filterType === '' }" @click="filterType = ''">All</button>
        <button type="button" class="filter-chip" :class="{ 'filter-chip--active': filterType === 'putter' }" @click="filterType = 'putter'">Putter</button>
        <button type="button" class="filter-chip" :class="{ 'filter-chip--active': filterType === 'midrange' }" @click="filterType = 'midrange'">Midrange</button>
        <button type="button" class="filter-chip" :class="{ 'filter-chip--active': filterType === 'fairway' }" @click="filterType = 'fairway'">Fairway Driver</button>
        <button type="button" class="filter-chip" :class="{ 'filter-chip--active': filterType === 'distance' }" @click="filterType = 'distance'">Distance Driver</button>
      </div>

      <!-- ── Main View Container ── -->
      <main :class="{ 'disc-grid': viewMode === 'grid', 'disc-list': viewMode === 'list', 'disc-compact': viewMode === 'compact' }">
        <!-- Empty state -->
        <div class="empty-state" x-show="filteredSorted.length === 0">
          <div class="empty-icon">🥏</div>
          <h2>No discs yet</h2>
          <p>Click <strong>+ Add Disc</strong> to start building your bag!</p>
        </div>

        <!-- Render groups or flat list -->
        <template x-for="group in groupedDiscs" :key="group.label || 'main'">
          <div class="group-section">
            <!-- Group header (only if groupBy !== 'none') -->
            <template x-if="group.label">
              <div class="group-header" @click="toggleGroup(group.label)">
                <span class="group-header-label" x-text="group.label + ' (' + group.count + ')'"></span>
                <span class="group-header-icon" x-text="groupExpanded[group.label] !== false ? '▼' : '▶'"></span>
              </div>
            </template>

            <!-- Group content -->
            <div x-show="!group.label || groupExpanded[group.label] !== false">

              <!-- GRID VIEW -->
              <template x-if="viewMode === 'grid'">
                <div style="display:contents;">
                  <template x-for="disc in group.discs" :key="disc.id">
                    <div class="disc-card">
                      <!-- Round avatar: photo → color circle with initial → generic fallback -->
                      <div class="card-photo-wrap"
                           :class="disc.user_photo_url ? '' : 'card-photo-fallback'"
                           :style="!disc.user_photo_url ? (disc.color ? 'background:var(--disc-' + colorSlug(disc.color) + ')' : 'background:var(--' + (disc.type || 'putter') + ')') : ''">
                        <template x-if="disc.user_photo_url">
                          <img class="card-photo-thumb" :src="disc.user_photo_url" :alt="disc.name + ' photo'" loading="lazy"/>
                        </template>
                        <template x-if="!disc.user_photo_url">
                          <span class="card-photo-fallback-label" :aria-label="disc.name"
                                x-text="disc.name ? disc.name[0].toUpperCase() : '🥏'"></span>
                        </template>
                      </div>
                      <div class="card-header">
                        <div>
                          <div class="card-name" x-text="disc.name"></div>
                          <div class="card-manufacturer" x-show="disc.manufacturer" x-text="disc.manufacturer"></div>
                        </div>
                      </div>

                      <div class="card-details" x-show="disc.weight || disc.plastic || disc.color || disc.condition">
                        <span x-show="disc.weight">⚖️ <span x-text="disc.weight + 'g'"></span></span>
                        <span x-show="disc.plastic">🧪 <span x-text="disc.plastic"></span></span>
                        <span x-show="disc.color"><span class="disc-color-dot" :style="'background:var(--disc-' + colorSlug(disc.color) + ')'"></span><span x-text="disc.color"></span></span>
                        <span x-show="disc.condition"><span class="condition-dot" :class="'cond-' + safeCond(disc.condition)" :title="condLabel(safeCond(disc.condition))"></span><span x-text="condLabel(safeCond(disc.condition))"></span></span>
                      </div>

                      <div class="card-flight" x-show="hasFlightNumbers(disc)">
                        <span class="fn-icon">✈️</span>
                        <span class="fn-pill fp-speed" x-text="disc.speed" title="Speed"></span>
                        <span class="fn-sep">/</span>
                        <span class="fn-pill fp-glide" x-text="disc.glide" title="Glide"></span>
                        <span class="fn-sep">/</span>
                        <span class="fn-pill" :class="disc.turn < 0 ? 'fp-under' : 'fp-neutral'" x-text="formatTurn(disc.turn)" title="Turn"></span>
                        <span class="fn-sep">/</span>
                        <span class="fn-pill fp-fade" x-text="disc.fade" title="Fade"></span>
                        <span class="fn-stability" x-text="stabilityLabel(disc.turn, disc.fade)"></span>
                      </div>
                      <div class="card-bag-badges" x-show="getBagsForDisc(disc.id).length > 0">
                        <span class="bag-badge" x-text="'In ' + getBagsForDisc(disc.id).length + ' bag' + (getBagsForDisc(disc.id).length !== 1 ? 's' : '')"></span>
                      </div>
                      
                      <!-- Tags in grid view -->
                      <div class="tags-container" x-show="(disc.tags || []).length > 0" style="margin-top:.4rem;">
                        <template x-for="tag in (disc.tags || [])" :key="tag">
                          <span class="tag-chip tag-chip--clickable" 
                                @click="activeTagFilter = activeTagFilter === tag ? '' : tag"
                                :style="'background: oklch(from var(--' + tagColor(tag) + ') l c h / 0.2); color: var(--' + tagColor(tag) + ')'">
                            <span x-text="tag"></span>
                          </span>
                        </template>
                      </div>
                      
                      <div class="card-notes" x-show="disc.notes" x-text="disc.notes"></div>

                      <div class="card-actions">
                        <button class="btn btn-secondary edit-btn" @click="openEditModal(disc)">✏️ Edit</button>
                        <div class="bag-quick-action" x-data="{ open: false }" x-show="bags.length > 0">
                          <button class="btn btn-secondary btn-sm bag-quick-btn"
                                  @click.stop="open = !open"
                                  :title="getBagsForDisc(disc.id).map(b => b.name).join(', ') || 'Add to bag'">
                            👜<template x-if="getBagsForDisc(disc.id).length > 0"><span x-text="' ' + getBagsForDisc(disc.id).length"></span></template>
                          </button>
                          <div class="bag-dropdown" x-show="open" @click.outside="open = false">
                            <template x-for="bag in bags" :key="bag.id">
                              <label class="bag-dropdown-item">
                                <input type="checkbox"
                                       :checked="isDiscInBag(bag.id, disc.id)"
                                       @change.stop="toggleDiscInBag(bag.id, disc.id)" />
                                <span x-text="bag.name"></span>
                              </label>
                            </template>
                          </div>
                        </div>
                        <button class="btn btn-danger delete-btn" @click="openDeleteModal(disc)">🗑 Remove</button>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- LIST VIEW -->
              <template x-if="viewMode === 'list'">
                <div class="list-view-wrapper" style="display:contents;">
                  <!-- List header (only show for first group) -->
                  <template x-if="groupedDiscs.indexOf(group) === 0">
                    <div class="list-header">
                      <div class="list-header-cell list-col-color">Color</div>
                      <div class="list-header-cell list-col-type" @click="setSortColumn('type')">Type <span x-text="activeSortColumn === 'type' ? (sortDir === 'asc' ? '▲' : '▼') : ''"></span></div>
                      <div class="list-header-cell list-col-name" @click="setSortColumn('name')">Name <span x-text="activeSortColumn === 'name' ? (sortDir === 'asc' ? '▲' : '▼') : ''"></span></div>
                      <div class="list-header-cell list-col-flight">Flight</div>
                      <div class="list-header-cell list-col-weight" @click="setSortColumn('weight')">Weight <span x-text="activeSortColumn === 'weight' ? (sortDir === 'asc' ? '▲' : '▼') : ''"></span></div>
                      <div class="list-header-cell list-col-condition" @click="setSortColumn('condition')">Cond <span x-text="activeSortColumn === 'condition' ? (sortDir === 'asc' ? '▲' : '▼') : ''"></span></div>
                      <div class="list-header-cell list-col-bags">Bags</div>
                      <div class="list-header-cell list-col-tags">Tags</div>
                      <div class="list-header-cell list-col-actions"></div>
                    </div>
                  </template>
                  
                  <!-- List rows -->
                  <template x-for="disc in group.discs" :key="disc.id">
                    <div class="list-row">
                      <div class="list-col-color">
                        <span class="disc-color-dot" :style="'background:var(--disc-' + colorSlug(disc.color) + ')'"></span>
                      </div>
                      <div class="list-col-type">
                        <span class="type-badge" :class="'type-' + (disc.type || 'putter')" x-text="disc.type === 'putter' ? 'P' : disc.type === 'midrange' ? 'M' : disc.type === 'fairway' ? 'F' : 'D'"></span>
                      </div>
                      <div class="list-col-name">
                        <div class="list-name" x-text="disc.name"></div>
                        <div class="list-brand" x-text="disc.manufacturer"></div>
                      </div>
                      <div class="list-col-flight">
                        <template x-if="hasFlightNumbers(disc)">
                          <div style="display:flex;gap:.15rem;align-items:center;">
                            <span class="fn-pill fp-speed" style="font-size:.7rem;padding:.15rem .3rem;" x-text="disc.speed" title="Speed"></span>
                            <span class="fn-pill fp-glide" style="font-size:.7rem;padding:.15rem .3rem;" x-text="disc.glide" title="Glide"></span>
                            <span class="fn-pill" style="font-size:.7rem;padding:.15rem .3rem;" :class="disc.turn < 0 ? 'fp-under' : 'fp-neutral'" x-text="formatTurn(disc.turn)" title="Turn"></span>
                            <span class="fn-pill fp-fade" style="font-size:.7rem;padding:.15rem .3rem;" x-text="disc.fade" title="Fade"></span>
                          </div>
                        </template>
                      </div>
                      <div class="list-col-weight" x-text="disc.weight ? disc.weight + 'g' : '—'"></div>
                      <div class="list-col-condition">
                        <template x-if="disc.condition">
                          <div style="display:flex;align-items:center;gap:.2rem;justify-content:center;">
                            <span class="condition-dot" :class="'cond-' + safeCond(disc.condition)"></span>
                            <span style="font-size:.75rem;" x-text="condLabel(safeCond(disc.condition))[0]"></span>
                          </div>
                        </template>
                      </div>
                      <div class="list-col-bags" x-text="getBagsForDisc(disc.id).length || '—'"></div>
                      <div class="list-col-tags">
                        <div class="tags-container">
                          <template x-for="tag in (disc.tags || [])" :key="tag">
                            <span class="tag-chip tag-chip--clickable" 
                                  @click="activeTagFilter = activeTagFilter === tag ? '' : tag"
                                  :style="'background: oklch(from var(--' + tagColor(tag) + ') l c h / 0.2); color: var(--' + tagColor(tag) + ')'">
                              <span x-text="tag"></span>
                            </span>
                          </template>
                        </div>
                      </div>
                      <div class="list-col-actions">
                        <button class="btn-icon" @click="openEditModal(disc)" title="Edit">✏️</button>
                        <button class="btn-icon" @click="openDeleteModal(disc)" title="Delete">🗑</button>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- COMPACT VIEW -->
              <template x-if="viewMode === 'compact'">
                <div style="display:contents;">
                  <template x-for="disc in group.discs" :key="disc.id">
                    <div class="compact-row">
                      <span class="type-badge" style="flex-shrink:0;" :class="'type-' + (disc.type || 'putter')" x-text="disc.type === 'putter' ? 'P' : disc.type === 'midrange' ? 'M' : disc.type === 'fairway' ? 'F' : 'D'"></span>
                      <div class="compact-name-brand">
                        <span x-text="disc.name"></span>
                        <template x-if="disc.manufacturer">
                          <span style="color:var(--clr-muted);" x-text="' – ' + disc.manufacturer"></span>
                        </template>
                      </div>
                      <div class="compact-flight" x-show="hasFlightNumbers(disc)" x-text="'(' + disc.speed + '/' + disc.glide + '/' + formatTurn(disc.turn) + '/' + disc.fade + ')'"></div>
                      <div class="compact-tags">
                        <template x-for="tag in (disc.tags || [])" :key="tag">
                          <span class="tag-chip tag-chip--clickable" 
                                @click="activeTagFilter = activeTagFilter === tag ? '' : tag"
                                :style="'background: oklch(from var(--' + tagColor(tag) + ') l c h / 0.2); color: var(--' + tagColor(tag) + ')'">
                            <span x-text="tag"></span>
                          </span>
                        </template>
                      </div>
                      <div class="compact-actions">
                        <button class="btn-icon" @click="openEditModal(disc)" title="Edit">✏️</button>
                        <button class="btn-icon" @click="openDeleteModal(disc)" title="Delete">🗑</button>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

            </div>
          </div>
        </template>
      </main>

      </div><!-- /inventory tab -->

      <!-- ── Bags Tab ── -->
      <div x-show="activeTab === 'bags'">
        <div class="bags-panel">
          <div class="bags-header">
            <span x-text="bags.length + ' bag' + (bags.length !== 1 ? 's' : '')"></span>
          </div>

          <!-- Empty state -->
          <div class="empty-state" x-show="bags.length === 0">
            <div class="empty-icon">👜</div>
            <h2>No bags yet</h2>
            <p>Click <strong>+ Create Bag</strong> to build your first bag configuration!</p>
          </div>

          <!-- Bag cards -->
          <template x-for="bag in bags" :key="bag.id">
            <div class="bag-card">
              <div class="bag-card-header" @click="activeBagId = (activeBagId === bag.id ? null : bag.id)">
                <div class="bag-card-info">
                  <span class="bag-name" x-text="bag.name"></span>
                  <span class="bag-count" x-text="bag.discIds.length + ' disc' + (bag.discIds.length !== 1 ? 's' : '')"></span>
                </div>
                <div class="bag-card-actions">
                  <button class="btn btn-secondary btn-sm" @click.stop="openEditBagModal(bag)" title="Rename">✏️</button>
                  <button class="btn btn-danger btn-sm" @click.stop="openDeleteBagModal(bag)" title="Delete">🗑</button>
                  <span class="bag-chevron" x-text="activeBagId === bag.id ? '▲' : '▼'"></span>
                </div>
              </div>

              <!-- Expanded detail -->
              <div class="bag-detail" x-show="activeBagId === bag.id">
                <div class="bag-detail-actions">
                  <button class="btn btn-secondary btn-sm" @click="openDiscPicker(bag.id)">+ Add / Remove Discs</button>
                  <button class="btn btn-secondary btn-sm" @click="openPinModal(null, bag.id)">📍 Pin to Course</button>
                </div>

                <div class="bag-discs-empty" x-show="bag.discIds.length === 0">
                  No discs in this bag yet — add some from your inventory!
                </div>

                <div class="bag-discs-list" x-show="bag.discIds.length > 0">
                  <template x-for="disc in getDiscsForBag(bag)" :key="disc.id">
                    <div class="bag-disc-row">
                      <span class="bag-disc-name" x-text="disc.name"></span>
                      <span class="bag-disc-mfr" x-show="disc.manufacturer" x-text="disc.manufacturer"></span>
                      <span class="type-badge" :class="'type-' + safeType(disc.type)" x-text="typeLabel(safeType(disc.type))"></span>
                      <button class="btn btn-danger btn-sm" @click="removeDiscFromBag(bag.id, disc.id)" title="Remove from bag">✕</button>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div><!-- /bags tab -->

      <!-- ── Courses Tab ── -->
      <div x-show="activeTab === 'courses'">
        <div class="courses-panel">
          <div class="courses-header">
            <span x-text="coursePins.length + ' pinned course' + (coursePins.length !== 1 ? 's' : '')"></span>
          </div>

          <!-- Empty state -->
          <div class="empty-state" x-show="coursePins.length === 0">
            <div class="empty-icon">🗺</div>
            <h2>No courses pinned yet</h2>
            <p>Click <strong>📍 Pin a Course</strong> to save a bag setup for a course!</p>
          </div>

          <!-- Course pin cards -->
          <template x-for="pin in coursePins" :key="pin.id">
            <div class="course-pin-card">
              <div class="course-pin-info">
                <span class="course-name" x-text="pin.courseName"></span>
                <span class="course-bag-name" x-text="getBagForPin(pin)?.name || '(bag deleted)'"></span>
                <span class="course-bag-name" x-show="getDownloadedMapSummary(pin)" x-text="'Downloaded map: ' + getDownloadedMapSummary(pin)"></span>
              </div>
              <div class="course-pin-actions">
                <button class="btn btn-secondary btn-sm" @click="downloadCourseMap(pin)" title="Download hole map data">⬇ Download Map</button>
                <a class="btn btn-secondary btn-sm"
                   :href="getPinMapLinks(pin).google"
                   target="_blank"
                   rel="noopener noreferrer"
                   title="Open in Google Maps">🧭 Google Maps</a>
                <a class="btn btn-secondary btn-sm"
                   x-show="getPinMapLinks(pin).osm"
                   :href="getPinMapLinks(pin).osm"
                   target="_blank"
                   rel="noopener noreferrer"
                   title="Open in OpenStreetMap">🗺 OSM</a>
                <button class="btn btn-secondary btn-sm" @click="openPinModal(pin)" title="Edit">✏️</button>
                <button class="btn btn-danger btn-sm" @click="deletePin(pin)" title="Remove">🗑</button>
              </div>
            </div>
          </template>
        </div>
      </div><!-- /courses tab -->

      <!-- ── Add / Edit Modal ── -->
      <div class="modal-overlay"
           x-show="showAddModal"
           x-transition.opacity
           @click.self="closeModals()"
           role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
          <div class="modal-header">
            <h2 class="modal-title" id="modalTitle" x-text="formId ? 'Edit Disc' : 'Add Disc'"></h2>
            <button class="modal-close" @click="closeModals()" aria-label="Close">✕</button>
          </div>
          <form @submit.prevent="saveDisc()" novalidate>

            <div class="form-row">
              <div class="form-group" style="position:relative">
                <label for="discName">Disc Name *</label>
                <input type="text" id="discName" placeholder="e.g. Destroyer" required
                       autocomplete="off"
                       x-model="form.name"
                       @input="searchDiscCatalogDebounced(form.name)"
                       :class="{ 'invalid': formInvalid.name }" />
                <!-- Catalog suggestions dropdown -->
                <div class="pdga-suggestions" x-show="discSuggestions.length > 0">
                  <template x-for="s in discSuggestions" :key="s.id">
                    <button type="button" class="pdga-suggestion-item" @click="selectDiscFromCatalog(s)">
                      <span x-text="s.name"></span>
                      <span class="pdga-course-meta" x-text="s.brand + ' · ' + s.category + ' · ' + s.speed + '/' + s.glide + '/' + s.turn + '/' + s.fade"></span>
                    </button>
                  </template>
                </div>
                <div class="pdga-loading" x-show="discSuggestionsLoading">Searching catalog…</div>
              </div>
              <div class="form-group">
                <label for="discManufacturer">Manufacturer</label>
                <input type="text" id="discManufacturer" placeholder="e.g. Innova"
                       x-model="form.manufacturer" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="discType">Type *</label>
                <select id="discType" required
                        x-model="form.type"
                        :class="{ 'invalid': formInvalid.type }">
                  <option value="">Select type…</option>
                  <option value="putter">Putter</option>
                  <option value="midrange">Midrange</option>
                  <option value="fairway">Fairway Driver</option>
                  <option value="distance">Distance Driver</option>
                </select>
              </div>
              <div class="form-group">
                <label for="discPlastic">Plastic</label>
                <input type="text" id="discPlastic" placeholder="e.g. Star, Champion…"
                       x-model="form.plastic" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="discWeight">Weight (g)</label>
                <input type="text" id="discWeight" placeholder="175"
                       x-model="form.weight" />
              </div>
              <div class="form-group">
                <label>Color</label>
                <div class="color-picker" role="group" aria-label="Choose disc color">
                  <button type="button" class="color-swatch color-none"
                          :class="{ 'selected': form.color === '' }"
                          @click="selectColor('')"
                          aria-label="No color" title="No color">×</button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Crimson' }"
                          @click="selectColor('Crimson')"
                          style="background:var(--disc-crimson)" aria-label="Crimson" title="Crimson"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Tangerine' }"
                          @click="selectColor('Tangerine')"
                          style="background:var(--disc-tangerine)" aria-label="Tangerine" title="Tangerine"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Solar Yellow' }"
                          @click="selectColor('Solar Yellow')"
                          style="background:var(--disc-solar-yellow)" aria-label="Solar Yellow" title="Solar Yellow"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Lime' }"
                          @click="selectColor('Lime')"
                          style="background:var(--disc-lime)" aria-label="Lime" title="Lime"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Emerald' }"
                          @click="selectColor('Emerald')"
                          style="background:var(--disc-emerald)" aria-label="Emerald" title="Emerald"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Seafoam' }"
                          @click="selectColor('Seafoam')"
                          style="background:var(--disc-seafoam)" aria-label="Seafoam" title="Seafoam"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Electric Blue' }"
                          @click="selectColor('Electric Blue')"
                          style="background:var(--disc-electric-blue)" aria-label="Electric Blue" title="Electric Blue"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Iris' }"
                          @click="selectColor('Iris')"
                          style="background:var(--disc-iris)" aria-label="Iris" title="Iris"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Hot Plum' }"
                          @click="selectColor('Hot Plum')"
                          style="background:var(--disc-hot-plum)" aria-label="Hot Plum" title="Hot Plum"></button>
                  <button type="button" class="color-swatch"
                          :class="{ 'selected': form.color === 'Hot Pink' }"
                          @click="selectColor('Hot Pink')"
                          style="background:var(--disc-hot-pink)" aria-label="Hot Pink" title="Hot Pink"></button>
                </div>
                <div class="color-label" aria-live="polite" x-text="form.color"></div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="discCondition">Condition</label>
                <select id="discCondition" x-model="form.condition">
                  <option value="new">New / Mint</option>
                  <option value="good">Good</option>
                  <option value="used">Used</option>
                  <option value="beat">Beat-in</option>
                </select>
              </div>
              <div class="form-group">
                <label>Flight Numbers</label>
                <div class="flight-inputs">
                  <div class="flight-input-group">
                    <input type="number" id="discSpeed" min="1" max="15" placeholder="Spd"
                           x-model="form.speed" title="Speed (1-15)" />
                    <span class="flight-input-label">Spd</span>
                  </div>
                  <div class="flight-input-group">
                    <input type="number" id="discGlide" min="1" max="7" placeholder="Gli"
                           x-model="form.glide" title="Glide (1-7)" />
                    <span class="flight-input-label">Gli</span>
                  </div>
                  <div class="flight-input-group">
                    <input type="number" id="discTurn" min="-5" max="1" placeholder="Trn"
                           x-model="form.turn" title="Turn (-5 to +1)" />
                    <span class="flight-input-label">Trn</span>
                  </div>
                  <div class="flight-input-group">
                    <input type="number" id="discFade" min="0" max="5" placeholder="Fde"
                           x-model="form.fade" title="Fade (0-5)" />
                    <span class="flight-input-label">Fde</span>
                  </div>
                </div>
                <div class="stability-preview"
                     x-show="form.speed !== '' && form.speed != null"
                     x-text="stabilityLabel(Number(form.turn), Number(form.fade))"></div>
              </div>
            </div>

            <div class="form-group full-width">
              <label for="discNotes">Notes</label>
              <textarea id="discNotes" rows="2" placeholder="Favorite hyzer flip disc…"
                        x-model="form.notes"></textarea>
            </div>

            <!-- Tags -->
            <div class="form-group full-width">
              <label>Tags</label>
              <div class="tags-container" style="min-height: 32px; flex-wrap: wrap; display: flex; gap: .35rem; margin-bottom: .4rem;">
                <template x-for="tag in form.tags" :key="tag">
                  <span class="tag-chip" 
                        :style="'background: oklch(from var(--' + tagColor(tag) + ') l c h / 0.2); color: var(--' + tagColor(tag) + ')'">
                    <span x-text="tag"></span>
                    <button type="button" @click="form.tags = form.tags.filter(t => t !== tag)">×</button>
                  </span>
                </template>
              </div>
              <div style="display:flex; gap:.4rem;">
                <input type="text" class="form-input" placeholder="Add tag…" x-model="tagInput"
                       @keydown.enter.prevent="addTag()"
                       list="tag-suggestions" />
                <datalist id="tag-suggestions">
                  <template x-for="t in allTags" :key="t"><option :value="t"></option></template>
                </datalist>
                <button type="button" class="btn btn-secondary btn-sm" @click="addTag()">Add</button>
              </div>
            </div>

            <!-- Photo upload -->
            <div class="form-group full-width">
              <label>Your Disc Photo</label>

              <!-- Current photo (Edit mode only) -->
              <template x-if="formId && discs.find(d => d.id === formId)?.user_photo_url">
                <div class="bag-photo-current">
                  <img class="bag-photo-current-img"
                       :src="discs.find(d => d.id === formId)?.user_photo_url"
                       :alt="form.name + ' photo'"/>
                  <button type="button" class="btn btn-danger btn-sm" @click="removeDiscPhoto()">Remove photo</button>
                </div>
              </template>

              <!-- Upload preview -->
              <template x-if="photoPreview">
                <div class="bag-photo-preview">
                  <img class="bag-photo-preview-img" :src="photoPreview" alt="Preview"/>
                  <!-- In Edit mode: manual save/cancel buttons -->
                  <div class="bag-photo-preview-actions" x-show="formId">
                    <button type="button" class="btn btn-primary btn-sm"
                            @click="uploadDiscPhoto()"
                            :disabled="photoUploading">
                      <span x-show="!photoUploading">Save photo</span>
                      <span x-show="photoUploading">Uploading…</span>
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" @click="cancelPhotoUpload()">Cancel</button>
                  </div>
                  <!-- In Add mode: photo saves automatically with disc -->
                  <div x-show="!formId" style="font-size:.78rem;color:var(--clr-muted);margin-top:.4rem">
                    📸 Photo will be saved with the disc
                    <button type="button" class="btn btn-secondary btn-sm" style="margin-left:.5rem" @click="cancelPhotoUpload()">Remove</button>
                  </div>

                  <!-- AI disc identification -->
                  <div style="margin-top:.6rem">
                    <p style="font-size:.75rem;color:var(--clr-muted);margin-bottom:.4rem">💡 Best results: lay disc face-up, shoot straight down, show the printed text</p>
                    <button type="button" class="btn btn-primary btn-sm"
                            @click="identifyDiscFromPhoto()"
                            :disabled="aiIdentifying">
                      <span x-show="!aiIdentifying">🔍 AI Identify Disc</span>
                      <span x-show="aiIdentifying">🔄 Scanning photo…</span>
                    </button>
                    <div x-show="aiIdentifyMsg" x-text="aiIdentifyMsg"
                         style="font-size:.78rem;margin-top:.35rem;padding:.3rem .5rem;border-radius:6px;background:var(--clr-surface-raised)"></div>
                  </div>
                </div>
              </template>

              <!-- Upload button (only shown when no preview active) -->
              <template x-if="!photoPreview">
                <div style="margin-top:.5rem">
                  <label class="btn btn-secondary btn-sm" style="cursor:pointer;display:inline-flex;align-items:center;gap:.4rem">
                    📸 <span x-text="formId && discs.find(d => d.id === formId)?.user_photo_url ? 'Change photo' : 'Add photo'"></span>
                    <input type="file" id="bagPhotoInput" x-ref="bagPhotoInput"
                           accept="image/jpeg,image/png,image/webp"
                           class="hidden-input"
                           @change="handlePhotoSelected($event)"/>
                  </label>
                  <span style="font-size:.78rem;color:var(--clr-muted);margin-left:.5rem">JPEG, PNG or WEBP · max 5MB</span>
                </div>
              </template>

            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-secondary" @click="closeModals()">Cancel</button>
              <button type="submit" class="btn btn-primary" x-text="formId ? 'Update Disc' : 'Save Disc'"></button>
            </div>
          </form>
        </div>
      </div>

      <!-- ── Delete Confirm Modal ── -->
      <div class="modal-overlay"
           x-show="showDeleteModal"
           x-transition.opacity
           @click.self="closeModals()"
           role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
        <div class="modal modal-sm">
          <div class="modal-header">
            <h2 class="modal-title" id="deleteTitle">Remove Disc</h2>
            <button class="modal-close" @click="closeModals()" aria-label="Close">✕</button>
          </div>
          <p x-text="pendingDeleteDisc ? 'Remove &quot;' + pendingDeleteDisc.name + '&quot; from your bag?' : ''"></p>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" @click="closeModals()">Cancel</button>
            <button type="button" class="btn btn-danger" @click="confirmDelete()">Remove</button>
          </div>
        </div>
      </div>

      <!-- ── Export / Import bar ── -->
      <div class="io-bar">
        <button class="btn btn-secondary btn-sm" @click="exportBag()" title="Download your disc bag as JSON">⬇ Export</button>
        <label class="btn btn-secondary btn-sm" title="Import a disc bag JSON file">
          ⬆ Import
          <input type="file" accept=".json" class="hidden-input" @change="importBag($event)" />
        </label>
      </div>

      <!-- ── Bag Create / Rename Modal ── -->
      <div class="modal-overlay"
           x-show="showBagModal"
           x-transition.opacity
           @click.self="showBagModal = false"
           role="dialog" aria-modal="true" aria-labelledby="bagModalTitle">
        <div class="modal modal-sm">
          <div class="modal-header">
            <h2 class="modal-title" id="bagModalTitle" x-text="bagForm.id ? 'Rename Bag' : 'Create Bag'"></h2>
            <button class="modal-close" @click="showBagModal = false" aria-label="Close">✕</button>
          </div>
          <form @submit.prevent="saveBag()" novalidate>
            <div class="form-group">
              <label for="bagNameInput">Bag Name</label>
              <input type="text" id="bagNameInput" placeholder="e.g. Short Course Bag"
                     x-model="bagForm.name" required />
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" @click="showBagModal = false">Cancel</button>
              <button type="submit" class="btn btn-primary" x-text="bagForm.id ? 'Rename' : 'Create'"></button>
            </div>
          </form>
        </div>
      </div>

      <!-- ── Bag Delete Confirm Modal ── -->
      <div class="modal-overlay"
           x-show="showDeleteBagModal"
           x-transition.opacity
           @click.self="showDeleteBagModal = false"
           role="dialog" aria-modal="true" aria-labelledby="deleteBagTitle">
        <div class="modal modal-sm">
          <div class="modal-header">
            <h2 class="modal-title" id="deleteBagTitle">Delete Bag</h2>
            <button class="modal-close" @click="showDeleteBagModal = false" aria-label="Close">✕</button>
          </div>
          <p x-text="pendingDeleteBag ? 'Delete &quot;' + pendingDeleteBag.name + '&quot;? Discs stay in your inventory.' : ''"></p>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" @click="showDeleteBagModal = false">Cancel</button>
            <button type="button" class="btn btn-danger" @click="confirmDeleteBag()">Delete</button>
          </div>
        </div>
      </div>

      <!-- ── Disc Picker Modal ── -->
      <div class="modal-overlay"
           x-show="showDiscPickerModal"
           x-transition.opacity
           @click.self="closeDiscPicker()"
           role="dialog" aria-modal="true" aria-labelledby="discPickerTitle">
        <div class="modal modal-lg">
          <div class="modal-header">
            <h2 class="modal-title" id="discPickerTitle">Add / Remove Discs</h2>
            <button class="modal-close" @click="closeDiscPicker()" aria-label="Close">✕</button>
          </div>
          <div class="form-group">
            <input type="search" placeholder="Search inventory…"
                   aria-label="Search discs"
                   x-model="discPickerSearch" />
          </div>
          <div class="disc-picker-list" role="list">
            <template x-for="disc in discPickerFiltered" :key="disc.id">
              <label class="disc-picker-item" :class="{ selected: isDiscInBag(discPickerBagId, disc.id) }" role="listitem">
                <input type="checkbox"
                       :checked="isDiscInBag(discPickerBagId, disc.id)"
                       @change="toggleDiscInBag(discPickerBagId, disc.id)" />
                <span class="disc-picker-name" x-text="disc.name"></span>
                <span class="disc-picker-mfr" x-show="disc.manufacturer" x-text="disc.manufacturer"></span>
                <span class="type-badge" :class="'type-' + safeType(disc.type)" x-text="typeLabel(safeType(disc.type))"></span>
              </label>
            </template>
            <div class="bag-discs-empty" x-show="discPickerFiltered.length === 0">No discs found</div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-primary" @click="closeDiscPicker()">Done</button>
          </div>
        </div>
      </div>

      <!-- ── Course Pin Modal ── -->
      <div class="modal-overlay"
           x-show="showPinModal"
           x-transition.opacity
           @click.self="closePinModal()"
           role="dialog" aria-modal="true" aria-labelledby="pinModalTitle">
        <div class="modal modal-sm">
          <div class="modal-header">
            <h2 class="modal-title" id="pinModalTitle" x-text="editingPinId ? 'Edit Course Pin' : 'Pin a Course'"></h2>
            <button class="modal-close" @click="closePinModal()" aria-label="Close">✕</button>
          </div>
          <form @submit.prevent="savePin()" novalidate>
            <div class="form-group" style="position:relative">
              <label for="courseSearchInput">Course Name</label>
              <input type="text" id="courseSearchInput"
                     placeholder="Search or type course name…"
                     autocomplete="off"
                     x-model="pinForm.courseQuery"
                     @input="searchCoursesDebounced(pinForm.courseQuery); pinForm.courseName = pinForm.courseQuery"
                     required />
              <div class="form-actions" style="justify-content:flex-start; margin-top:.5rem; margin-bottom:.25rem;">
                <button type="button" class="btn btn-secondary btn-sm" @click="loadNorwayCourses()">🇳🇴 Load Norway courses</button>
              </div>
              <p style="margin:.25rem 0 .5rem; font-size:.8rem; color:var(--clr-muted);">DiscGolfMetrix map links require a Metrix course ID. Google Maps is available for all pins.</p>
              <!-- OSM Overpass autocomplete dropdown -->
              <div class="pdga-suggestions" x-show="pdgaSuggestions.length > 0">
                <template x-for="course in pdgaSuggestions" :key="course.osmId">
                  <button type="button" class="pdga-suggestion-item" @click="selectCourse(course)">
                    <span x-text="course.name"></span>
                    <span class="pdga-course-meta" x-text="[course.holes ? course.holes + ' holes' : '', course.city, course.country].filter(Boolean).join(' · ')"></span>
                  </button>
                </template>
              </div>
              <div class="pdga-loading" x-show="pdgaLoading">Searching courses…</div>
            </div>
            <div class="form-group">
              <label for="pinBagSelect">Bag</label>
              <select id="pinBagSelect" x-model="pinForm.bagId" required>
                <option value="">Select a bag…</option>
                <template x-for="bag in bags" :key="bag.id">
                  <option :value="bag.id" x-text="bag.name"></option>
                </template>
              </select>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" @click="closePinModal()">Cancel</button>
              <button type="submit" class="btn btn-primary">Save Pin</button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </template>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script src="disc-catalog.js"></script>
<script src="app.js"></script>
</body>
</html>
