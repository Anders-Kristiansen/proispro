<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob: https://*.supabase.co https://*.googleusercontent.com; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" />
  <title>Discs For Sale · ProIsPro</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .sale-page { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    .sale-header { text-align: center; margin-bottom: 2rem; }
    .sale-header h1 { font-size: 1.6rem; margin-bottom: .3rem; }
    .sale-header p { color: var(--clr-muted); font-size: .9rem; }
    .sale-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .sale-disc-card {
      background: var(--clr-surface2);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .sale-disc-name { font-weight: 700; font-size: 1rem; }
    .sale-disc-mfr { color: var(--clr-muted); font-size: .82rem; }
    .sale-disc-details { font-size: .82rem; margin-top: .4rem; display: flex; flex-wrap: wrap; gap: .3rem; }
    .sale-detail-chip {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 999px;
      padding: .15rem .6rem;
      font-size: .75rem;
    }
    .sale-empty { text-align: center; padding: 3rem 1rem; color: var(--clr-muted); }
    .sale-empty h2 { font-size: 1.2rem; margin-bottom: .5rem; }
    .sale-loading { text-align: center; padding: 3rem 1rem; color: var(--clr-muted); }
    .sale-private-banner {
      text-align: center;
      padding: 3rem 1rem;
    }
    .sale-private-banner h2 { font-size: 1.2rem; margin-bottom: .5rem; }
    .back-link { display: inline-block; margin-bottom: 1rem; color: var(--clr-accent2); text-decoration: none; font-size: .88rem; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="app" x-data="saleApp()" x-init="init()">
    <div class="sale-page">
      <a class="back-link" href="/">← Back to ProIsPro</a>

      <template x-if="loading">
        <div class="sale-loading">⏳ Loading sale list…</div>
      </template>

      <template x-if="!loading && error">
        <div class="sale-private-banner">
          <div style="font-size:2rem;margin-bottom:.5rem;">🔒</div>
          <h2>Sale list not available</h2>
          <p x-text="error"></p>
        </div>
      </template>

      <template x-if="!loading && !error">
        <div>
          <div class="sale-header">
            <div style="font-size:2rem;margin-bottom:.4rem;">🏷</div>
            <h1>Discs For Sale</h1>
            <p x-text="discs.length + ' disc' + (discs.length !== 1 ? 's' : '') + ' available'"></p>
          </div>

          <template x-if="discs.length === 0">
            <div class="sale-empty">
              <h2>No discs listed yet</h2>
              <p>Check back later!</p>
            </div>
          </template>

          <div class="sale-grid" x-show="discs.length > 0">
            <template x-for="disc in discs" :key="disc.id">
              <div class="sale-disc-card">
                <div class="sale-disc-name" x-text="disc.disc_name || '(unknown)'"></div>
                <div class="sale-disc-mfr" x-text="disc.disc_manufacturer || ''"></div>
                <div class="sale-disc-details">
                  <template x-if="disc.disc_type">
                    <span class="sale-detail-chip" x-text="disc.disc_type"></span>
                  </template>
                  <template x-if="disc.disc_plastic">
                    <span class="sale-detail-chip" x-text="disc.disc_plastic"></span>
                  </template>
                  <template x-if="disc.disc_weight">
                    <span class="sale-detail-chip" x-text="disc.disc_weight + 'g'"></span>
                  </template>
                  <template x-if="disc.disc_color">
                    <span class="sale-detail-chip" x-text="disc.disc_color"></span>
                  </template>
                  <template x-if="disc.disc_condition">
                    <span class="sale-detail-chip" x-text="disc.disc_condition"></span>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.104.0/dist/umd/supabase.min.js" integrity="sha384-DBZI/1Gz1C29oeP5N6ORumbrmMNoaze4Afb4/c3JkFv79Wh3n1DIzbLRVbu6sJQT" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js" integrity="sha384-WPtu0YHhJ3arcykfnv1JgUffWDSKRnqnDeTpJUbOc2os2moEmLkIdaeR0trPN4be" crossorigin="anonymous"></script>
  <script>
    const SUPABASE_URL = 'https://odqhusmmqgipvazusrxs.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_p0KpjMepMloZb6SI-y6ang_2uzbdQ9U';

    function saleApp() {
      return {
        loading: true,
        error: null,
        discs: [],

        async init() {
          const params = new URLSearchParams(window.location.search);
          const token = params.get('token');
          if (!token) {
            this.error = 'No sale token provided in URL.';
            this.loading = false;
            return;
          }
          try {
            const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

            // Resolve token → user_id via secure function (prevents bulk enumeration)
            const { data: tokenRow, error: tokenErr } = await sb
              .rpc('lookup_sale_token', { p_token: token })
              .maybeSingle();

            if (tokenErr || !tokenRow) {
              this.error = 'Sale list not found. The link may be invalid or the list has been deleted.';
              this.loading = false;
              return;
            }
            if (!tokenRow.is_public) {
              this.error = 'This sale list is currently private.';
              this.loading = false;
              return;
            }

            // Load available listings for this user
            const { data: listings, error: listErr } = await sb
              .from('forsale_listings')
              .select('*')
              .eq('user_id', tokenRow.user_id)
              .eq('status', 'available')
              .order('listed_at', { ascending: false });

            if (listErr) throw listErr;
            this.discs = listings || [];
          } catch (e) {
            this.error = 'Could not load sale list. Please try again later.';
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>
</body>
</html>
