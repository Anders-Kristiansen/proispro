<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob: https://*.supabase.co https://*.googleusercontent.com; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" />
  <title>ProIsPro – Flight Guide</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="flight-guide.css" />
</head>
<body>

<div class="fg-page" x-data="flightGuide()" x-cloak>

  <!-- ── Header ── -->
  <header class="fg-header">
    <a href="index.html" class="fg-back-btn">← My Bag</a>
    <a href="index.html" class="fg-logo-link">
      <span style="font-size:1.4rem">🥏</span>
      <span style="font-size:.95rem;font-weight:700;color:var(--clr-muted)">ProIsPro</span>
    </a>
    <h1 class="fg-title">🗺 Flight Guide</h1>
    <p style="font-size:.8rem;color:var(--clr-muted);margin-left:auto;display:none" id="fg-tagline">
      Browse thousands of discs — sorted by speed &amp; stability
    </p>
  </header>

  <!-- ── Loading State ── -->
  <template x-if="loading">
    <div class="fg-state">
      <div class="fg-state-icon">🥏</div>
      <h2>Loading disc catalog…</h2>
      <p>Fetching data from the DiscIt API. This may take a few seconds on first load.</p>
    </div>
  </template>

  <!-- ── Error State ── -->
  <template x-if="!loading && error">
    <div class="fg-state">
      <div class="fg-state-icon">⚠️</div>
      <h2>Could not load catalog</h2>
      <p x-text="error"></p>
      <button class="btn btn-primary" @click="window.location.reload()">Retry</button>
    </div>
  </template>

  <!-- ── Main Content ── -->
  <template x-if="!loading && !error">
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">

      <!-- ── Toolbar ── -->
      <div class="fg-toolbar">
        <input
          class="fg-search"
          type="search"
          placeholder="Search discs or brands…"
          aria-label="Search discs"
          x-model="search"
        />

        <select class="fg-select" aria-label="Filter by brand" x-model="filterBrand">
          <option value="">All brands</option>
          <template x-for="b in brands" :key="b.slug">
            <option :value="b.slug" x-text="b.name"></option>
          </template>
        </select>

        <select class="fg-select" aria-label="Filter by type" x-model="filterType">
          <option value="">All types</option>
          <option value="distance">Distance Driver</option>
          <option value="fairway">Fairway / Hybrid</option>
          <option value="midrange">Midrange</option>
          <option value="putter">Putter</option>
        </select>

        <select class="fg-select" aria-label="Filter by stability" x-model="filterStability">
          <option value="">All stability</option>
          <template x-for="s in stabilityOrder" :key="s">
            <option :value="s" x-text="stabilityLabels[s]"></option>
          </template>
        </select>

        <button class="fg-reset-btn" @click="resetFilters()" title="Clear all filters">✕ Reset</button>

        <span class="fg-count" x-text="discCount.toLocaleString() + ' discs'"></span>
      </div>

      <!-- ── Legend ── -->
      <div class="fg-legend">
        <span class="fg-legend-label">Type:</span>
        <span class="fg-legend-item"><span class="fg-legend-dot fg-dot-putter"></span>Putter</span>
        <span class="fg-legend-item"><span class="fg-legend-dot fg-dot-midrange"></span>Midrange</span>
        <span class="fg-legend-item"><span class="fg-legend-dot fg-dot-fairway"></span>Fairway / Hybrid</span>
        <span class="fg-legend-item"><span class="fg-legend-dot fg-dot-distance"></span>Distance Driver</span>
        <span class="fg-legend-item"><span class="fg-legend-dot fg-dot-bag"></span>In my bag</span>
      </div>

      <!-- ── Body ── -->
      <div class="fg-body">

        <!-- ── Grid ── -->
        <div class="fg-grid-wrapper" role="main">

          <!-- Empty filtered state -->
          <div class="fg-state" x-show="gridRows.length === 0 && !loading">
            <div class="fg-state-icon">🔍</div>
            <h2>No discs match your filters</h2>
            <p>Try a different search or <button class="btn btn-secondary btn-sm" @click="resetFilters()">reset filters</button></p>
          </div>

          <!-- Grid header row (stability axis) -->
          <div class="fg-axis-header" x-show="gridRows.length > 0">
            <div class="fg-axis-corner">Spd</div>
            <div class="fg-stab-header stab-color-vos">Very<br>Overstable</div>
            <div class="fg-stab-header stab-color-os">Overstable</div>
            <div class="fg-stab-header stab-color-s">Stable</div>
            <div class="fg-stab-header stab-color-us">Understable</div>
            <div class="fg-stab-header stab-color-vus">Very<br>Understable</div>
          </div>

          <!-- Stability arrow -->
          <div class="fg-stability-arrow" x-show="gridRows.length > 0">
            <div></div>
            <div class="fg-arrow-track">
              <span style="text-align:left;color:oklch(0.72 0.22 25);font-weight:700">← Overstable</span>
              <div class="arrow-line"></div>
              <span style="text-align:right;color:oklch(0.74 0.20 265);font-weight:700">Understable →</span>
            </div>
          </div>

          <!-- Speed rows -->
          <template x-for="row in gridRows" :key="row.speed">
            <div class="fg-speed-row">

              <!-- Speed label -->
              <div class="fg-speed-label" x-text="row.speed" :title="'Speed ' + row.speed"></div>

              <!-- Stability cells -->
              <template x-for="stab in stabilityOrder" :key="stab">
                <div class="fg-stab-cell">
                  <template x-for="disc in (row.cells[stab] || [])" :key="disc.id">
                    <div
                      class="disc-tile"
                      :class="'type-' + disc.type + (isInBag(disc) ? ' in-bag' : '')"
                      @click="selectDisc(disc, $event)"
                      :title="disc.name + ' (' + disc.brand + ') — ' + disc.speed + '/' + disc.glide + '/' + formatTurn(disc.turn) + '/' + disc.fade"
                    >
                      <span x-text="disc.name"></span>
                    </div>
                  </template>
                </div>
              </template>

            </div>
          </template>

        </div><!-- /fg-grid-wrapper -->

        <!-- Disc Detail Modal Backdrop -->
        <div 
          class="fg-modal-backdrop" 
          x-show="showDetail" 
          x-transition.opacity
          @click.self="closeModal()"
          role="dialog"
          aria-modal="true"
          aria-labelledby="modal-title"
        >
          <div class="fg-modal-card" @click.stop @keydown.tab.prevent="handleTabKey($event)">
            
            <!-- Close button -->
            <button 
              class="fg-modal-close" 
              @click="closeModal()" 
              aria-label="Close disc details"
            >✕</button>

            <template x-if="selectedDisc">
              <div class="fg-modal-content">
                
                <!-- Left col: SVG flight chart (always shown in catalog) -->
                <div class="fg-modal-image-col">
                  <svg class="fg-flight-path" viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
                    <rect width="300" height="220" rx="8" fill="oklch(0.15 0.02 260)"/>
                    <line x1="150" y1="15" x2="150" y2="205" stroke="oklch(0.35 0.02 260)" stroke-width="1" stroke-dasharray="3,5" opacity="0.5"/>
                    <line x1="150" y1="195" x2="150" y2="25" stroke="oklch(0.4 0.04 260)" stroke-width="1" opacity="0.4"/>
                    <polygon points="145,28 150,18 155,28" fill="oklch(0.4 0.04 260)" opacity="0.4"/>
                    <path :d="flightPath(selectedDisc)" fill="none" stroke="oklch(0.65 0.18 195)" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
                    <path :d="flightPath(selectedDisc)" fill="none" stroke="oklch(0.78 0.22 195)" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="150" cy="195" r="5" fill="oklch(0.8 0.18 195)"/>
                    <circle :cx="flightEnd(selectedDisc).x" :cy="flightEnd(selectedDisc).y" r="4" fill="oklch(0.72 0.2 35)"/>
                    <text x="12" y="18" font-size="9" fill="oklch(0.5 0.04 260)" font-family="system-ui,sans-serif">L ←</text>
                    <text x="260" y="18" font-size="9" fill="oklch(0.5 0.04 260)" font-family="system-ui,sans-serif">→ R</text>
                  </svg>
                </div>

                <!-- Right col: Details -->
                <div class="fg-modal-details-col">
                  
                  <!-- Name + Brand -->
                  <h2 class="fg-modal-name" id="modal-title" x-text="selectedDisc.name"></h2>
                  <div class="fg-modal-brand" x-text="selectedDisc.brand + ' · ' + (typeLabels[selectedDisc.type] || selectedDisc.category)"></div>

                  <!-- Badges -->
                  <div class="fg-modal-badges">
                    <span 
                      class="type-badge" 
                      :class="'type-' + selectedDisc.type" 
                      x-text="typeLabels[selectedDisc.type] || selectedDisc.category"
                    ></span>
                    <span 
                      class="fn-stability" 
                      x-text="stabilityLabels[selectedDisc.stabilitySlug]"
                    ></span>
                  </div>

                  <!-- Flight Numbers -->
                  <div class="fg-fn-section">
                    <div class="fg-fn-title">Flight Numbers</div>

                    <div class="fg-fn-row">
                      <span class="fg-fn-row-label" style="color:var(--fairway)">Speed</span>
                      <div class="fg-fn-bar-wrap">
                        <div class="fg-fn-bar bar-speed" :style="'width:' + speedBar(selectedDisc.speed)"></div>
                      </div>
                      <span class="fg-fn-val" x-text="selectedDisc.speed"></span>
                    </div>

                    <div class="fg-fn-row">
                      <span class="fg-fn-row-label" style="color:var(--midrange)">Glide</span>
                      <div class="fg-fn-bar-wrap">
                        <div class="fg-fn-bar bar-glide" :style="'width:' + glideBar(selectedDisc.glide)"></div>
                      </div>
                      <span class="fg-fn-val" x-text="selectedDisc.glide"></span>
                    </div>

                    <div class="fg-fn-row">
                      <span 
                        class="fg-fn-row-label" 
                        :style="selectedDisc.turn < 0 ? 'color:oklch(0.74 0.18 204)' : 'color:oklch(0.72 0.22 25)'"
                      >Turn</span>
                      <div class="fg-fn-bar-wrap">
                        <div 
                          class="fg-fn-bar" 
                          :class="selectedDisc.turn < 0 ? 'bar-turn-under' : 'bar-turn-over'"
                          :style="'width:' + turnBar(selectedDisc.turn)"
                        ></div>
                      </div>
                      <span class="fg-fn-val" x-text="formatTurn(selectedDisc.turn)"></span>
                    </div>

                    <div class="fg-fn-row">
                      <span class="fg-fn-row-label" style="color:var(--distance)">Fade</span>
                      <div class="fg-fn-bar-wrap">
                        <div class="fg-fn-bar bar-fade" :style="'width:' + fadeBar(selectedDisc.fade)"></div>
                      </div>
                      <span class="fg-fn-val" x-text="selectedDisc.fade"></span>
                    </div>
                  </div>

                  <!-- Wear Adjustment Section (placeholder — schema being built by Basher) -->
                  <div class="fg-wear-section" x-show="isInBag(selectedDisc)">
                    <div class="fg-wear-title">Wear Adjustment</div>
                    <p style="font-size:.85rem;color:var(--clr-muted);">
                      Adjust flight numbers based on disc wear — coming soon.
                    </p>
                  </div>

                  <!-- Notes/Description placeholder -->
                  <div class="fg-notes-section">
                    <div class="fg-notes-title">Description</div>
                    <p class="fg-notes-empty">No description available yet.</p>
                  </div>

                  <!-- CTA -->
                  <div class="fg-modal-actions">
                    <button 
                      class="fg-add-btn" 
                      @click="addToBag(selectedDisc)"
                    >+ Add to My Bag</button>
                  </div>

                </div><!-- /fg-modal-details-col -->

              </div><!-- /fg-modal-content -->
            </template>

          </div><!-- /fg-modal-card -->
        </div><!-- /fg-modal-backdrop -->

      </div><!-- /fg-body -->

    </div>
  </template>

</div><!-- /fg-page -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.104.0/dist/umd/supabase.min.js" integrity="sha384-DBZI/1Gz1C29oeP5N6ORumbrmMNoaze4Afb4/c3JkFv79Wh3n1DIzbLRVbu6sJQT" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js" integrity="sha384-WPtu0YHhJ3arcykfnv1JgUffWDSKRnqnDeTpJUbOc2os2moEmLkIdaeR0trPN4be" crossorigin="anonymous"></script>
<script src="disc-catalog.js"></script>
<script src="flight-guide.js"></script>
</body>
</html>
